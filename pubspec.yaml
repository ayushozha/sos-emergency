name: sos_emergency
description: "SOS Emergency — a GenUI Flutter app for emergency assistance."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  genui: ^0.9.2
  googleai_dart: ^8.0.0
  openai_dart: ^1.4.0
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  go_router: ^17.3.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.1
  very_good_analysis: ^10.3.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true
