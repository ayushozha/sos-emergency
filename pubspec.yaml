name: sos_emergency
description: "SOS Emergency — a GenUI Flutter app for emergency assistance."
publish_to: "none"
version: 0.2.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  freezed_annotation: ^3.1.0
  genui: ^0.9.2
  go_router: ^17.3.0
  googleai_dart: ^8.0.0
  http: ^1.2.0
  intl: any
  json_annotation: ^4.9.0
  json_schema_builder: ^0.1.5
  openai_dart: ^1.4.0
  riverpod_annotation: ^4.0.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  build_runner: ^2.15.0
  custom_lint: ^0.8.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  mocktail: ^1.0.1
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
  generate: true
