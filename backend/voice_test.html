<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SOS Emergency — backend test harness</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 14px/1.5 system-ui, sans-serif; margin: 0; padding: 1.5rem; max-width: 1100px; }
  h1 { font-size: 1.25rem; margin: 0 0 1rem; }
  .row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .col { flex: 1 1 460px; min-width: 320px; }
  fieldset { border: 1px solid #8884; border-radius: 8px; margin: 0 0 1rem; padding: 1rem; }
  legend { font-weight: 600; padding: 0 .4rem; }
  label { display: block; font-size: 12px; opacity: .8; margin: .6rem 0 .2rem; }
  input, textarea, select, button { font: inherit; width: 100%; box-sizing: border-box;
    padding: .5rem; border-radius: 6px; border: 1px solid #8886; background: transparent; color: inherit; }
  textarea { resize: vertical; }
  button { cursor: pointer; width: auto; padding: .5rem 1rem; }
  button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .btns { display: flex; gap: .5rem; margin-top: .6rem; flex-wrap: wrap; }
  pre { background: #8881; border-radius: 6px; padding: .6rem; max-height: 280px; overflow: auto;
    white-space: pre-wrap; word-break: break-word; margin: .3rem 0 0; }
  .status { font-weight: 600; }
  .dot { display:inline-block; width:.7em; height:.7em; border-radius:50%; margin-right:.4em; vertical-align: baseline; background:#999; }
  .on { background:#16a34a; } .off { background:#999; } .err { background:#dc2626; }
  .muted { opacity:.6; font-size:12px; }
</style>
</head>
<body>
<h1>SOS Emergency — backend test harness</h1>

<label>Backend base URL</label>
<input id="baseUrl" value="http://127.0.0.1:8000" style="max-width:380px" />

<div class="row" style="margin-top:1rem">
  <div class="col">
    <fieldset>
      <legend>Voice agent — WS /v1/voice/agent (PDF frames)</legend>
      <label>Locale</label>
      <input id="vLocale" value="en-US" />
      <label>Severity tier (optional)</label>
      <select id="vTier">
        <option value="">(none)</option>
        <option value="neutral">neutral</option>
        <option value="moderate">moderate</option>
        <option value="high">high</option>
        <option value="critical">critical</option>
      </select>
      <div class="btns">
        <button id="connectBtn" class="primary">Connect &amp; talk</button>
        <button id="disconnectBtn" disabled>Disconnect</button>
        <button id="sendTextBtn" disabled>Send typed text</button>
      </div>
      <label>Typed utterance (sends <code>text</code> frame)</label>
      <input id="vText" value="I was in a crash, need help" />
      <p class="status" style="margin-top:.8rem"><span id="dot" class="dot off"></span><span id="status">not connected</span></p>
      <p class="muted">Mic → 16 kHz PCM16 as base64 <code>audio.chunk</code> JSON frames. TTS returns <code>audio.chunk</code> (base64 @ 24 kHz).</p>

      <label>Transcript / events</label>
      <pre id="vLog"></pre>
      <label>Composed surface</label>
      <pre id="vA2ui"></pre>
    </fieldset>
  </div>

  <div class="col">
    <fieldset>
      <legend>Compose — POST /v1/chat/stream (PDF contract)</legend>
      <label>Scenario</label>
      <select id="cScenario">
        <option value="unknown">unknown (opening triage)</option>
        <option value="crash">crash</option>
        <option value="medical">medical</option>
        <option value="beingFollowed">beingFollowed</option>
        <option value="flatTire">flatTire</option>
        <option value="wontStart">wontStart</option>
      </select>
      <label>Severity</label>
      <select id="cSeverity">
        <option value="neutral">neutral</option>
        <option value="moderate">moderate</option>
        <option value="high">high</option>
        <option value="critical">critical</option>
      </select>
      <label>Mode</label>
      <select id="cMode">
        <option value="triage">triage</option>
        <option value="crash">crash</option>
        <option value="medical">medical</option>
        <option value="threat">threat</option>
        <option value="roadside">roadside</option>
      </select>
      <label class="muted"><input type="checkbox" id="cNight" /> Night mode</label>
      <label class="muted"><input type="checkbox" id="cStream" checked /> SSE stream (stream=true)</label>
      <div class="btns"><button id="sendBtn" class="primary">Compose</button></div>
      <label>Surface JSON</label>
      <pre id="tA2ui"></pre>
      <label>Stream log</label>
      <pre id="tLog"></pre>
    </fieldset>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const baseUrl = () => $("baseUrl").value.replace(/\/+$/, "");
const wsUrl = () => baseUrl().replace(/^http/, "ws") + "/v1/voice/agent";

const MIC_RATE = 16000;
const TTS_RATE = 24000;

function composePayload() {
  const scenario = $("cScenario").value;
  const mode = $("cMode").value;
  return {
    classification: {
      scenario,
      severity: $("cSeverity").value,
      mode,
      confidence: 0.95,
      hazards: [],
    },
    context: {
      carState: "parked",
      connectivity: "online",
      isNight: $("cNight").checked,
      locale: "en-US",
      emergencyNumber: "911",
    },
    catalogVersion: "2026.06.0",
    stream: $("cStream").checked,
    timeBudgetMs: 3000,
  };
}

$("sendBtn").onclick = async () => {
  $("tA2ui").textContent = "";
  $("tLog").textContent = "";
  const body = composePayload();

  let resp;
  try {
    resp = await fetch(baseUrl() + "/v1/chat/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
  } catch (e) { $("tLog").textContent = "Request failed: " + e; return; }
  if (!resp.ok) { $("tLog").textContent = "HTTP " + resp.status + ": " + (await resp.text()); return; }

  if (!body.stream) {
    const json = await resp.json();
    $("tA2ui").textContent = JSON.stringify(json.surface, null, 2);
    $("tLog").textContent = "finishReason: " + json.finishReason;
    return;
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = "", nodes = [];
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const parts = buf.split("\n\n");
    buf = parts.pop() || "";
    for (const block of parts) {
      for (const line of block.split("\n")) {
        if (!line.startsWith("data: ")) continue;
        let obj;
        try { obj = JSON.parse(line.slice(6)); } catch { $("tLog").textContent += "[unparsed] " + line + "\n"; continue; }
        if (obj.type === "node") {
          nodes.push(obj.node);
          $("tLog").textContent += "node: " + obj.node.type + (obj.parentId ? " (parent " + obj.parentId + ")" : "") + "\n";
        } else if (obj.type === "done") {
          $("tLog").textContent += "done: " + obj.finishReason + "\n";
        } else if (obj.type === "error") {
          $("tLog").textContent += "error: " + obj.code + " — " + obj.message + "\n";
        }
      }
    }
  }
  if (nodes.length) $("tA2ui").textContent = JSON.stringify(nodes[0], null, 2);
};

let ws = null, micCtx = null, micStream = null, micNode = null, micSource = null;
let outCtx = null, playhead = 0, audioInSeq = 0, sessionReady = false;

function log(line) { $("vLog").textContent += line + "\n"; $("vLog").scrollTop = $("vLog").scrollHeight; }
function setStatus(txt, cls) { $("status").textContent = txt; $("dot").className = "dot " + cls; }

function downsample(f32, inRate, outRate) {
  if (inRate === outRate) return f32;
  const ratio = inRate / outRate;
  const out = new Float32Array(Math.round(f32.length / ratio));
  for (let i = 0; i < out.length; i++) {
    const idx = i * ratio, i0 = Math.floor(idx), i1 = Math.min(i0 + 1, f32.length - 1);
    const frac = idx - i0;
    out[i] = f32[i0] * (1 - frac) + f32[i1] * frac;
  }
  return out;
}

function playPCM(int16) {
  if (!outCtx) return;
  const f32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 0x8000;
  const buf = outCtx.createBuffer(1, f32.length, TTS_RATE);
  buf.copyToChannel(f32, 0);
  const src = outCtx.createBufferSource();
  src.buffer = buf; src.connect(outCtx.destination);
  const now = outCtx.currentTime;
  if (playhead < now) playhead = now + 0.04;
  src.start(playhead);
  playhead += buf.duration;
}

function b64ToInt16(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const n = bytes.byteLength & ~1;
  return new Int16Array(bytes.buffer.slice(0, n));
}

function int16ToB64(i16) {
  const bytes = new Uint8Array(i16.buffer, i16.byteOffset, i16.byteLength);
  let bin = "";
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function handleVoiceFrame(obj) {
  switch (obj.type) {
    case "session.ready":
      sessionReady = true;
      log("session.ready id=" + obj.sessionId);
      setStatus("ready — speak now", "on");
      break;
    case "transcript":
      log((obj.isFinal ? "💬" : "…") + " " + obj.role + ": " + obj.text);
      break;
    case "audio.chunk":
      playPCM(b64ToInt16(obj.audio));
      break;
    case "intent":
      log("intent: " + obj.intent + " (" + obj.confidence + ")");
      break;
    case "compose":
      $("vA2ui").textContent = JSON.stringify(obj.surface, null, 2);
      log("compose: " + (obj.surface && obj.surface.type));
      break;
    case "event":
      log("· " + obj.name);
      break;
    case "error":
      log("✗ " + obj.code + ": " + obj.message + (obj.fatal ? " (fatal)" : ""));
      if (obj.fatal) setStatus("error", "err");
      break;
    case "session.closed":
      log("session.closed: " + obj.reason);
      break;
    default:
      log("? " + JSON.stringify(obj));
  }
}

function sendSessionStart() {
  const tier = $("vTier").value;
  const config = {
    locale: $("vLocale").value.trim() || "en-US",
    sampleRate: MIC_RATE,
    codec: "pcm16",
  };
  if (tier) config.tier = tier;
  ws.send(JSON.stringify({ type: "session.start", config }));
  log("→ session.start");
}

async function connect() {
  $("vLog").textContent = ""; $("vA2ui").textContent = "";
  sessionReady = false; audioInSeq = 0;
  setStatus("connecting…", "off");
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1 } });
  } catch (e) { setStatus("mic permission denied", "err"); log("✗ getUserMedia: " + e); return; }

  ws = new WebSocket(wsUrl());
  ws.onmessage = (ev) => {
    let obj; try { obj = JSON.parse(ev.data); } catch { log("[unparsed] " + ev.data); return; }
    handleVoiceFrame(obj);
  };
  ws.onclose = () => { setStatus("disconnected", "off"); cleanupMic(); toggle(false); sessionReady = false; };
  ws.onerror = () => { setStatus("websocket error", "err"); };
  ws.onopen = () => {
    sendSessionStart();
    outCtx = new (window.AudioContext || window.webkitAudioContext)();
    playhead = 0;
    startMic();
    toggle(true);
  };
}

function startMic() {
  micCtx = new (window.AudioContext || window.webkitAudioContext)();
  micSource = micCtx.createMediaStreamSource(micStream);
  micNode = micCtx.createScriptProcessor(4096, 1, 1);
  micNode.onaudioprocess = (e) => {
    if (!ws || ws.readyState !== WebSocket.OPEN || !sessionReady) return;
    const ds = downsample(e.inputBuffer.getChannelData(0), micCtx.sampleRate, MIC_RATE);
    const i16 = new Int16Array(ds.length);
    for (let i = 0; i < ds.length; i++) {
      const s = Math.max(-1, Math.min(1, ds[i]));
      i16[i] = s * 0x7fff;
    }
    ws.send(JSON.stringify({
      type: "audio.chunk",
      seq: audioInSeq++,
      audio: int16ToB64(i16),
    }));
  };
  micSource.connect(micNode);
  micNode.connect(micCtx.destination);
}

function cleanupMic() {
  try { micNode && micNode.disconnect(); } catch {}
  try { micSource && micSource.disconnect(); } catch {}
  try { micStream && micStream.getTracks().forEach((t) => t.stop()); } catch {}
  try { micCtx && micCtx.close(); } catch {}
  try { outCtx && outCtx.close(); } catch {}
  micNode = micSource = micStream = micCtx = outCtx = null;
}

function disconnect() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    try { ws.send(JSON.stringify({ type: "session.end" })); } catch {}
  }
  try { ws && ws.close(); } catch {}
  cleanupMic();
}

function toggle(connected) {
  $("connectBtn").disabled = connected;
  $("disconnectBtn").disabled = !connected;
  $("sendTextBtn").disabled = !connected;
}

$("connectBtn").onclick = connect;
$("disconnectBtn").onclick = disconnect;
$("sendTextBtn").onclick = () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const text = $("vText").value.trim();
  if (!text) return;
  ws.send(JSON.stringify({ type: "text", text }));
  log("→ text: " + text);
};
</script>
</body>
</html>
